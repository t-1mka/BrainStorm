services:
  - type: web
    name: brainstorm
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn.conf.py wsgi:application
    envVars:
      - key: GIGACHAT_CREDENTIALS
        sync: false
      - key: GIGACHAT_SCOPE
        value: GIGACHAT_API_PERS
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: LOG_LEVEL
        value: INFO
    # Примечание: на Free-плане Render диск ephemeral.
    # Для постоянного хранения лидерборда подключите Render Disk
    # или PostgreSQL (DATABASE_URL), иначе данные сбрасываются при деплое.
