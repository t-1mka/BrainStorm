services:
  - type: web
    name: brainstorm
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn.conf.py wsgi:application
    envVars:
      - key: GIGACHAT_CREDENTIALS
        sync: false          # вставить вручную в Render Dashboard
      - key: GIGACHAT_SCOPE
        value: GIGACHAT_API_PERS
      - key: SECRET_KEY
        generateValue: true  # Render генерирует автоматически
      - key: ADMIN_SECRET_KEY
        sync: false          # вставить вручную — код для Admin-панели (по умолчанию 1379)
      - key: CHEAT_CODE
        sync: false          # вставить вручную — код для чит-меню (по умолчанию 1778)
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: LOG_LEVEL
        value: INFO
